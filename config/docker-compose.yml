version: '3.8'

services:
  searxng:
    image: searxng/searxng:latest
    container_name: rez-searxng
    ports:
      - "8080:8080"
    volumes:
      - ./searxng-settings.yml:/etc/searxng/settings.yml:ro
    restart: unless-stopped
    networks:
      - rez-network

networks:
  rez-network:
    driver: bridge
