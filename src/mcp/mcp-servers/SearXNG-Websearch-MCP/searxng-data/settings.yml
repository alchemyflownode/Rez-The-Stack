# SearXNG settings
use_default_settings: true
server:
  # IMPORTANT: Set SEARXNG_SECRET_KEY environment variable in production
  # Default is used only for development
  secret_key: "${SEARXNG_SECRET_KEY:default-dev-key-change-this}"
  limiter: false
  public_instance: false
  port: 8080
  bind_address: "0.0.0.0"
search:
  safe_search: 0
  formats:
    - html
    - json
engines:
  - name: google
    use_mobile_ui: false
    timeout: 3.0
    disabled: false
  - name: duckduckgo
    timeout: 3.0
    disabled: false
